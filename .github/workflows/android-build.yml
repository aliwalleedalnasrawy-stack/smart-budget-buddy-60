name: Build Android Debug APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Force Clean Setup
        run: |
          rm -rf android
          rm -f package.json package-lock.json capacitor.config.ts capacitor.config.json
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android --force

      - name: Build Assets
        run: |
          mkdir -p dist
          echo "<html><body>App Root</body></html>" > dist/index.html

      - name: Create Capacitor Config
        run: |
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.smartbudget.buddy",
            "appName": "SmartBudget",
            "webDir": "dist",
            "bundledWebRuntime": false
          }
          EOF

      - name: Build Android Project
        run: |
          npx cap add android
          npx cap sync android

      - name: Gradle Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Fix dist structure for Capacitor
        run: |
          mkdir -p dist/client
          if [ -f "dist/server/index.html" ]; then
            cp dist/server/index.html dist/client/index.html
          fi
          if [ ! -f "dist/client/index.html" ]; then
            find dist -name "index.html" | head -1 | xargs -I{} cp {} dist/client/ 2>/dev/null || true
          fi
          if [ ! -f "dist/client/index.html" ]; then
            cat > dist/client/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
            <title>ميزانيتي الذكية</title>
            <script>
              // Redirect to assets
              window.location.href = '/index.html';
            </script>
          </head>
          <body>
            <div id="root"></div>
          </body>
          </html>
          EOF
          fi
          cp -r dist/client/assets dist/client/ 2>/dev/null || true
          echo "=== Final dist/client ==="
          ls -la dist/client/

      - name: Remove old Android folder
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Generate Android icons
        run: |
          sudo apt-get install -y imagemagick
          ICON_SRC="public/1000135335.png"
          MIPMAP_PATH="android/app/src/main/res"
          for DIR_SIZE in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            DIR="${DIR_SIZE%%:*}"
            SIZE="${DIR_SIZE##*:}"
            mkdir -p "$MIPMAP_PATH/$DIR"
            convert "$ICON_SRC" -resize ${SIZE}x${SIZE} "$MIPMAP_PATH/$DIR/ic_launcher.png"
            convert "$ICON_SRC" -resize ${SIZE}x${SIZE} "$MIPMAP_PATH/$DIR/ic_launcher_round.png"
          done

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android Debug APK

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Ensure Capacitor CLI & Android packages
        run: |
          npm install --legacy-peer-deps \
            @capacitor/core@8.3.1 \
            @capacitor/cli@8.3.1 \
            @capacitor/android@8.3.1

      - name: Build web assets
        run: npm run build:android:web

      - name: Add Android platform (if missing)
        id: ensure_android
        run: |
          if [ ! -d "android" ]; then
            echo "Android folder not found, generating with Capacitor..."
            npx cap add android
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "Android folder already present, skipping cap add."
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy web assets to native project
        run: npx cap copy android

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x ./android/gradlew

      - name: Commit generated Android project files
        if: github.event_name == 'push' && steps.ensure_android.outputs.generated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f android
          if ! git diff --cached --quiet; then
            git commit -m "Add Capacitor Android project [skip ci]"
            git push
          else
            echo "No generated Android changes to commit."
          fi

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Debug APK with Gradle
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List APK output (debug)
        if: always()
        run: |
          echo "Listing APK outputs..."
          find android/app/build/outputs -type f -name "*.apk" || true

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

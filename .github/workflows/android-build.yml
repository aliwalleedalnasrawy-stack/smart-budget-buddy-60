name: Build Android Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Prepare dist/client with index.html
        run: |
          mkdir -p dist/client
          if [ -f "dist/server/index.html" ]; then
            cp dist/server/index.html dist/client/index.html
          else
            find dist -name "index.html" -not -path "*/client/*" | head -1 | xargs -I{} cp {} dist/client/index.html 2>/dev/null || true
          fi
          if [ ! -f "dist/client/index.html" ]; then
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ميزانيتي الذكية</title></head><body><div id="root"></div></body></html>' > dist/client/index.html
          fi
          echo "=== dist/client contents ==="
          ls -la dist/client/

      - name: Remove old Android folder
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android
        env:
          CAPACITOR_ANDROID_STUDIO_PATH: ""

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

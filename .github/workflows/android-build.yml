name: Build Android Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Prepare Capacitor web dir
        run: |
          mkdir -p dist/client
          find dist -name "*.js" -o -name "*.css" | head -5
          echo "=== dist structure ==="
          find dist -type f | head -30
          cp -r dist/client/* dist/client/ 2>/dev/null || true
          JSFILE=$(find dist -name "*.js" -not -path "*/server/*" | head -1)
          CSSFILE=$(find dist -name "*.css" -not -path "*/server/*" | head -1)
          echo "JS: $JSFILE"
          echo "CSS: $CSSFILE"
          cat > dist/client/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
            <title>ميزانيتي الذكية</title>
            <meta name="theme-color" content="#000000" />
            ${CSSFILE:+<link rel="stylesheet" href="/${CSSFILE#dist/client/}">}
          </head>
          <body>
            <div id="root">جاري التحميل...</div>
            ${JSFILE:+<script type="module" src="/${JSFILE#dist/client/}"></script>}
          </body>
          </html>
          HTMLEOF
          echo "=== Final index.html ==="
          cat dist/client/index.html

      - name: Remove old Android folder
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Generate Android icons
        run: |
          sudo apt-get install -y imagemagick
          ICON_SRC="public/1000135335.png"
          MIPMAP_PATH="android/app/src/main/res"
          for DIR_SIZE in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            DIR="${DIR_SIZE%%:*}"
            SIZE="${DIR_SIZE##*:}"
            mkdir -p "$MIPMAP_PATH/$DIR"
            convert "$ICON_SRC" -resize ${SIZE}x${SIZE} "$MIPMAP_PATH/$DIR/ic_launcher.png"
            convert "$ICON_SRC" -resize ${SIZE}x${SIZE} "$MIPMAP_PATH/$DIR/ic_launcher_round.png"
          done

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Create index.html in dist/client
        run: |
          cp dist/server/index.html dist/client/index.html 2>/dev/null || \
          find dist -name "index.html" -exec cp {} dist/client/index.html \; 2>/dev/null || \
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Smart Budget</title></head><body><div id="root"></div><script type="module" src="/assets/index.js"></script></body></html>' > dist/client/index.html

      - name: Remove old Android folder
        run: rm -rf android

      - name: Add Android platform fresh
        run: npx cap add android

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

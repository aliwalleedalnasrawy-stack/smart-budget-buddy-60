name: Build Android Debug APK

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build unsigned debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build:android:web

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Grant Gradle wrapper execute permission
        run: chmod +x android/gradlew

      - name: Build with Gradle (assembleDebug)
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: List generated APKs
        if: always()
        run: find android/app/build/outputs/apk -type f -name "*.apk" -print || true

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: walletapp-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
